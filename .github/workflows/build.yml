name: Build Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Build
        run: mvn -B clean package

      - name: Upload jar
        uses: actions/upload-artifact@v4.6.2
        with:
          name: DisableTrapdoors
          path: target/DisableTrapdoors-1.1.0.jar